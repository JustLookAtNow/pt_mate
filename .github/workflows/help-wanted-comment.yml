name: Help Wanted Auto Reply

on:
  issues:
    types: [labeled]

jobs:
  comment-on-help-wanted:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Add comment when help wanted label is added
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const label = context.payload.label;

            if (label.name === "help wanted") {
              const closeDate = new Date();
              closeDate.setDate(closeDate.getDate() + 7);
              const dateStr = closeDate.toISOString().split('T')[0];
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `该 issue 已被标记为 **help wanted**，如果 7 天内无人回复，将会在 ${dateStr} 自动关闭。`
              });
            }
