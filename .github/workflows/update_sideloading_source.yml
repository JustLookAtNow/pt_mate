name: Update Sideloading Source

on:
  workflow_run:
    workflows:
      - Build and Release APK
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-source:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master

      - name: Get latest release tag
        run: echo "RELEASE_TAG=$(git describe --tags --abbrev=0 || echo latest)" >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update source metadata
        run: python altsource/update_source.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add altsource/AltSource.json
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "chore: update sideloading source for ${RELEASE_TAG}"
            git push
          fi
